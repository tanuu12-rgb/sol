kind = "web"
previewPath = "/"
title = "CrisisIQ"
version = "1.0.0"
id = "artifacts/crisisiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20762

[services.development]
run = "pnpm --filter @workspace/crisisiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crisisiq", "run", "build" ]
publicDir = "artifacts/crisisiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20762"
BASE_PATH = "/"
